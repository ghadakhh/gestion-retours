# ============================================================
# CONFIGURATION DE LA CONNEXION À MYSQL (XAMPP)
# ============================================================

# URL de connexion à MySQL
# localhost  = votre propre ordinateur
# 3306       = port par défaut de MySQL
# gestion_retours = nom de la base de données
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_retours?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Utilisateur MySQL (root par défaut dans XAMPP)
spring.datasource.username=root

# Mot de passe MySQL (vide par défaut dans XAMPP)
spring.datasource.password=

# Driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# CONFIGURATION JPA / HIBERNATE
# ============================================================

# update = Hibernate crée/modifie les tables automatiquement
spring.jpa.hibernate.ddl-auto=update

# Afficher les requêtes SQL dans la console Eclipse (pour comprendre ce qui se passe)
spring.jpa.show-sql=true

# Dialecte MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# PORT DU SERVEUR
# ============================================================

# Le backend sera accessible sur http://localhost:8080
server.port=8080
